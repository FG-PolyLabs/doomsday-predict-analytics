name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: fg-polylabs
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE: us-central1-docker.pkg.dev/fg-polylabs/doomsday/doomsday-polymarket
  EXPORTER_IMAGE: us-central1-docker.pkg.dev/fg-polylabs/doomsday/doomsday-exporter
  API_IMAGE: us-central1-docker.pkg.dev/fg-polylabs/doomsday/doomsday-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-actions-ci@fg-polylabs.iam.gserviceaccount.com

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push doomsday-polymarket image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Build and push doomsday-exporter image
        run: |
          docker build -f Dockerfile.exporter -t ${{ env.EXPORTER_IMAGE }}:${{ github.sha }} -t ${{ env.EXPORTER_IMAGE }}:latest .
          docker push ${{ env.EXPORTER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.EXPORTER_IMAGE }}:latest

      - name: Build and push doomsday-api image
        run: |
          docker build -f Dockerfile.api -t ${{ env.API_IMAGE }}:${{ github.sha }} -t ${{ env.API_IMAGE }}:latest .
          docker push ${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.API_IMAGE }}:latest

      - name: Update doomsday-polymarket Cloud Run Job
        run: |
          gcloud run jobs update doomsday-polymarket \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}

      - name: Deploy doomsday-exporter Cloud Run Job
        run: |
          if gcloud run jobs describe doomsday-exporter \
              --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} --quiet 2>/dev/null; then
            gcloud run jobs update doomsday-exporter \
              --image=${{ env.EXPORTER_IMAGE }}:${{ github.sha }} \
              --region=${{ env.REGION }} \
              --project=${{ env.PROJECT_ID }}
          else
            gcloud run jobs create doomsday-exporter \
              --image=${{ env.EXPORTER_IMAGE }}:${{ github.sha }} \
              --region=${{ env.REGION }} \
              --project=${{ env.PROJECT_ID }} \
              --service-account=doomsday-runner@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          fi

      - name: Deploy doomsday-api Cloud Run Service
        run: |
          if gcloud run services describe doomsday-api \
              --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} --quiet 2>/dev/null; then
            gcloud run services update doomsday-api \
              --image=${{ env.API_IMAGE }}:${{ github.sha }} \
              --region=${{ env.REGION }} \
              --project=${{ env.PROJECT_ID }}
          else
            gcloud run services create doomsday-api \
              --image=${{ env.API_IMAGE }}:${{ github.sha }} \
              --region=${{ env.REGION }} \
              --project=${{ env.PROJECT_ID }} \
              --service-account=doomsday-runner@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
              --port=8080 \
              --memory=512Mi \
              --cpu=1 \
              --min-instances=0 \
              --max-instances=5 \
              --allow-unauthenticated
          fi
